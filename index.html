<!doctype html>
<html lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06111d">
  <meta name="color-scheme" content="dark">
  <title>גמר המונדיאל באשבל!!!</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f4f8ff;
      background: #06111d;
      font-synthesis: none;
    }

    * { box-sizing: border-box; }

    html, body, #app {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body { overscroll-behavior: none; }

    #app { position: relative; }

    canvas {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      outline: none;
    }

    .css3d-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .event-sign-copy {
      position: relative;
      display: flex;
      width: 1200px;
      height: 360px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      direction: rtl;
      color: #fff8d7;
      text-align: center;
      text-shadow:
        0 0 12px rgba(255, 240, 168, .95),
        0 0 34px rgba(255, 169, 40, .75),
        0 10px 18px rgba(0, 0, 0, .9);
      backface-visibility: hidden;
      transform-style: preserve-3d;
      pointer-events: none;
      user-select: none;
      font-family: "Courier New", ui-monospace, monospace;
    }

    .event-sign-copy::before {
      content: "";
      position: absolute;
      inset: 16px 28px;
      border-radius: 18px;
      background:
        radial-gradient(circle, rgba(255, 194, 55, .25) 2.8px, transparent 3.8px) 0 0 / 15px 15px,
        linear-gradient(180deg, #11171c, #030506);
      box-shadow: inset 0 0 70px rgba(0,0,0,.82);
    }

    .event-sign-copy span {
      position: relative;
      z-index: 1;
      display: block;
      font-weight: 950;
      letter-spacing: -.055em;
      white-space: nowrap;
    }

    .event-sign-copy .sign-line-one {
      font-size: 104px;
      line-height: .95;
    }

    .event-sign-copy .sign-line-two {
      margin-top: 12px;
      color: #ffca4d;
      font-size: 142px;
      line-height: .84;
    }

    .stadium-secondary-copy {
      position: relative;
      display: flex;
      width: 840px;
      height: 240px;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      direction: rtl;
      border-radius: 18px;
      color: white;
      text-align: center;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      pointer-events: none;
      user-select: none;
      box-shadow: inset 0 0 55px rgba(0,0,0,.82);
      font-family: "Courier New", ui-monospace, monospace;
    }

    .stadium-secondary-copy::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle, rgba(255, 190, 53, .34) 3.4px, transparent 4.5px) 0 0 / 18px 18px,
        linear-gradient(180deg, #11171b, #020304);
      box-shadow: inset 0 0 65px rgba(0,0,0,.9);
    }

    .stadium-secondary-copy::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: repeating-linear-gradient(180deg, transparent 0 8px, rgba(0,0,0,.19) 8px 10px);
      pointer-events: none;
    }

    .stadium-secondary-copy span {
      position: relative;
      z-index: 2;
      display: block;
      font-weight: 950;
      white-space: nowrap;
    }

    .time-board {
      background: #030506;
      border: 8px solid rgba(255, 171, 34, .36);
    }

    .time-board span {
      color: #ffc43b;
      font-family: "Courier New", ui-monospace, monospace;
      font-size: 94px;
      letter-spacing: -.06em;
      text-shadow:
        0 0 8px #fff1a8,
        0 0 22px #ff9e1b,
        0 0 46px rgba(255, 76, 0, .85);
    }

    .match-board {
      background: #030506;
      border: 8px solid rgba(210, 239, 255, .55);
    }

    .match-board span {
      color: #dff7ff;
      font-size: 68px;
      letter-spacing: -.075em;
      text-shadow:
        0 0 8px #fff,
        0 0 20px rgba(93, 210, 255, .95),
        0 0 42px rgba(25, 116, 255, .75);
    }

    .air-banner-copy {
      position: relative;
      display: flex;
      width: 850px;
      height: 160px;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      direction: rtl;
      border: 12px solid #f2d17b;
      border-radius: 7px;
      background:
        radial-gradient(circle, rgba(255, 201, 74, .42) 3px, transparent 4px) 0 0 / 17px 17px,
        linear-gradient(180deg, #23110c, #060303);
      color: #fff3c2;
      font-family: "Courier New", ui-monospace, monospace;
      font-size: 58px;
      font-weight: 950;
      letter-spacing: -.07em;
      text-align: center;
      text-shadow: 0 0 7px #fff, 0 0 19px #ffae30, 0 0 36px #ff4e00;
      box-shadow: inset 0 0 48px rgba(0,0,0,.85);
      backface-visibility: hidden;
      pointer-events: none;
      user-select: none;
    }

    .air-banner-copy::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(180deg, transparent 0 7px, rgba(0,0,0,.2) 7px 9px);
      pointer-events: none;
    }

    .air-banner-copy span { position: relative; z-index: 1; white-space: nowrap; }
    }

    #status {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 42%, rgba(52, 112, 153, .35), transparent 32%),
        linear-gradient(#091b2d, #02070d);
      transition: opacity .5s ease, visibility .5s ease;
    }

    #status.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .status-card {
      width: min(440px, 100%);
      text-align: center;
      line-height: 1.5;
    }

    .status-card h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 520;
      letter-spacing: -.04em;
    }

    .status-card p { margin: 0; color: #bed0df; }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 22px auto 0;
      border: 2px solid rgba(255,255,255,.16);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status.is-error .spinner { display: none; }
    #status.is-error h1 { font-size: clamp(24px, 5vw, 36px); }
    #status a { color: #bce6ff; }

    #controls {
      position: fixed;
      z-index: 10;
      top: max(16px, env(safe-area-inset-top));
      left: max(16px, env(safe-area-inset-left));
      width: min(310px, calc(100vw - 32px));
      padding: 15px 16px 14px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      background: rgba(3, 12, 20, .57);
      box-shadow: 0 16px 50px rgba(0,0,0,.2);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity .45s ease, transform .45s ease;
    }

    #controls.is-ready { opacity: 1; transform: none; }

    #controls fieldset {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      border: 0;
    }

    #controls legend {
      width: 100%;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(236,247,255,.76);
    }

    .control-row { display: grid; gap: 7px; }

    .control-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      font-size: 13px;
    }

    output {
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      height: 20px;
      margin: 0;
      accent-color: #a9ddf6;
      cursor: pointer;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 26px;
      font-size: 13px;
    }

    .toggle-row input { width: 18px; height: 18px; accent-color: #a9ddf6; }

    input:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
      border-radius: 4px;
    }

    .hint {
      margin: 12px 0 0;
      padding-top: 11px;
      border-top: 1px solid rgba(255,255,255,.1);
      color: rgba(225,238,247,.62);
      font-size: 11px;
      line-height: 1.4;
    }

    @media (max-width: 560px), (max-height: 560px) {
      #controls {
        top: auto;
        bottom: max(12px, env(safe-area-inset-bottom));
        left: max(12px, env(safe-area-inset-left));
        width: min(290px, calc(100vw - 24px));
        padding: 12px 14px;
      }
      #controls fieldset { gap: 8px; }
      #controls legend { margin-bottom: 7px; }
      .hint { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner { animation-duration: 1.8s; }
      #status, #controls { transition: none; }
    }
  </style>

</head>
<body>
  <main id="app" aria-label="פרסומת תלת־ממדית להקרנת גמר המונדיאל באשבל"></main>

  <section id="status" role="status" aria-live="polite" aria-atomic="true">
    <div class="status-card">
      <h1 dir="rtl">גמר המונדיאל באשבל!!!</h1>
      <p id="status-message">טוענים לוחות LED, מטוס וכדורי רגל…</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </section>

  <aside id="controls" aria-label="Ocean controls">
    <fieldset>
      <legend>Ocean conditions</legend>

      <label class="control-row" for="sea-state">
        <span class="control-label"><span>Sea state</span><output id="sea-output" for="sea-state">Moderate</output></span>
        <input id="sea-state" type="range" min="0.25" max="1.8" step="0.01" value="0.88">
      </label>

      <label class="control-row" for="time-of-day">
        <span class="control-label"><span>Time of day</span><output id="time-output" for="time-of-day">16:45</output></span>
        <input id="time-of-day" type="range" min="0" max="24" step="0.05" value="16.75">
      </label>

      <label class="toggle-row" for="drift-enabled">
        <span>Camera drift</span>
        <input id="drift-enabled" type="checkbox" checked>
      </label>

      <label class="control-row" for="drift-speed">
        <span class="control-label"><span>Drift speed</span><output id="drift-output" for="drift-speed">0.16×</output></span>
        <input id="drift-speed" type="range" min="0" max="0.5" step="0.01" value="0.16">
      </label>

      <div class="toggle-row" aria-label="Live rendering performance">
        <span>Performance</span>
        <output id="fps-output" aria-live="off">— FPS</output>
      </div>
    </fieldset>
    <p class="hint">Drag to look around. Pinch or scroll to change distance.</p>
  </aside>

  <noscript>
    <p style="position:fixed;inset:0;display:grid;place-items:center;margin:0;padding:24px;background:#06111d;color:white;text-align:center">
      JavaScript is required for this WebGPU experience.
    </p>
  </noscript>

  <script type="module" src="./stadium-airshow-v7.js"></script>
</body>
</html>
